# Full stack — Postgres, Redis, API, worker, and frontend.
#
#   cp infra/.env.example infra/.env   # edit SESSION_SECRET at minimum
#   docker compose -f infra/docker-compose.prod.yml --env-file infra/.env up -d --build
#
# Dashboard: http://localhost:8080
# API:       http://localhost:3000

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: argus
      POSTGRES_PASSWORD: argus
      POSTGRES_DB: argus
    volumes:
      - argus-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U argus -d argus"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - argus-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: ..
      dockerfile: app/backend/api/Dockerfile
      target: build
    environment:
      DATABASE_URL: postgresql://argus:argus@postgres:5432/argus
    command: ["pnpm", "exec", "prisma", "migrate", "deploy"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: ..
      dockerfile: app/backend/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://argus:argus@postgres:5432/argus
      REDIS_URL: redis://redis:6379
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required — copy infra/.env.example to infra/.env}
      FRONTEND_URL: http://localhost:8080
      DSN_HOST: localhost:3000
      DSN_PROTOCOL: http
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      FROM_EMAIL: ${FROM_EMAIL:-Argus <noreply@argus.dev>}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      BACHS_API_KEY: ${BACHS_API_KEY:-}
      BACHS_PRO_PRODUCT_ID: ${BACHS_PRO_PRODUCT_ID:-}
      BACHS_WEBHOOK_SECRET: ${BACHS_WEBHOOK_SECRET:-}
      BACHS_SERVER: ${BACHS_SERVER:-sandbox}
    ports:
      - "3000:3000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  worker:
    build:
      context: ..
      dockerfile: app/backend/worker/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://argus:argus@postgres:5432/argus
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: http://localhost:8080
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      FROM_EMAIL: ${FROM_EMAIL:-Argus <noreply@argus.dev>}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ..
      dockerfile: app/frontend/Dockerfile
      args:
        VITE_API_URL: http://localhost:3000/api/v1
        VITE_ARGUS_DSN: ${VITE_ARGUS_DSN:-}
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  argus-postgres:
  argus-redis:
