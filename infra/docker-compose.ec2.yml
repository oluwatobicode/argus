# EC2 deployment — API + worker only (no local Postgres/Redis).
#
# Usage on EC2:
#   cd argus
#   cp infra/.env.example infra/.env   # fill in all vars
#   docker compose -f infra/docker-compose.ec2.yml --env-file infra/.env up -d --build
#
# Re-deploy:
#   docker compose -f infra/docker-compose.ec2.yml --env-file infra/.env up -d --build

services:
  migrate:
    image: ghcr.io/oluwatobicode/argus-migrate:latest
    build:
      context: ..
      dockerfile: app/backend/api/Dockerfile
      target: build
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in infra/.env}
    command: ["pnpm", "exec", "prisma", "migrate", "deploy"]
    restart: "no"

  api:
    image: ghcr.io/oluwatobicode/argus-api:latest
    build:
      context: ..
      dockerfile: app/backend/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL}
      REDIS_URL: ${REDIS_URL:?Set REDIS_URL}
      SESSION_SECRET: ${SESSION_SECRET:?Set SESSION_SECRET}
      FRONTEND_URL: https://arguserror.xyz
      DSN_HOST: api.arguserror.xyz
      DSN_PROTOCOL: https
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      FROM_EMAIL: ${FROM_EMAIL:-Argus <noreply@argus.dev>}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      BACHS_API_KEY: ${BACHS_API_KEY:-}
      BACHS_PRO_PRODUCT_ID: ${BACHS_PRO_PRODUCT_ID:-}
      BACHS_WEBHOOK_SECRET: ${BACHS_WEBHOOK_SECRET:-}
      BACHS_SERVER: ${BACHS_SERVER:-sandbox}
    ports:
      - "3000:3000"
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    image: ghcr.io/oluwatobicode/argus-worker:latest
    build:
      context: ..
      dockerfile: app/backend/worker/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL}
      REDIS_URL: ${REDIS_URL:?Set REDIS_URL}
      FRONTEND_URL: https://arguserror.xyz
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      FROM_EMAIL: ${FROM_EMAIL:-Argus <noreply@argus.dev>}
    depends_on:
      migrate:
        condition: service_completed_successfully
