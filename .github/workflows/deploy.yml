name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/argus
            git pull origin main

            # Build one at a time to avoid OOM on t3.micro (1GB RAM)
            docker compose -f infra/docker-compose.ec2.yml --env-file infra/.env build migrate
            docker compose -f infra/docker-compose.ec2.yml --env-file infra/.env build api
            docker compose -f infra/docker-compose.ec2.yml --env-file infra/.env build worker

            # Start all services (images already built)
            docker compose -f infra/docker-compose.ec2.yml --env-file infra/.env up -d

            docker image prune -f
            echo "$(date): Deploy completed" >> ~/deploy.log
